<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Vault | Sandwi4 SMP</title>
  <link rel="icon" href="assets/sandwi4-logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-login" data-login-panel>
      <img src="assets/sandwi4-logo.png" alt="Sandwi4 SMP">
      <h1>Sandwi4 Vault</h1>
      <p>Скрит админ панел за управление на публичната информация.</p>
      <form data-login-form>
        <label>Потребител<input name="user" autocomplete="username" required></label>
        <label>Парола<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="primary-btn" type="submit">Вход</button>
        <span class="form-error" data-login-error></span>
      </form>
    </section>

    <section class="admin-panel hidden" data-admin-panel>
      <div class="admin-top">
        <div>
          <p class="eyebrow">Админ панел</p>
          <h1>Управление на сайта</h1>
        </div>
        <button class="ghost-btn" data-logout>Изход</button>
      </div>
      <form class="admin-form" data-settings-form>
        <label>IP адрес<input name="ip"></label>
        <label>Статус<input name="status"></label>
        <label>Версия<input name="version"></label>
        <label>Новина заглавие<input name="newsTitle"></label>
        <label>Новина текст<textarea name="newsText"></textarea></label>
        <label>Owner име<input name="ownerName"></label>
        <label>Admin име<input name="adminName"></label>
        <label>Vote 1 текст<input name="voteOne"></label>
        <label>Vote 2 текст<input name="voteTwo"></label>
        <div class="admin-actions">
          <button class="primary-btn" type="submit">Запази</button>
          <button class="ghost-btn" type="button" data-reset-settings>Върни начални</button>
        </div>
        <p class="admin-note">Промените се пазят в браузъра. За глобални промени в GitHub Pages редактирай файловете или добави backend услуга.</p>
      </form>
    </section>
  </main>
  <script src="js/site.js"></script>
</body>
</html>
